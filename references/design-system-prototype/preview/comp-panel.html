<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <span class="eyebrow" style="display:block; margin-bottom:14px;">Panel — hairline border + soft shadow (never both heavy)</span>
  <div style="background:#fff; border:1px solid var(--steel-line); border-radius:10px; box-shadow:0 1px 2px rgba(18,29,51,.035),0 8px 18px rgba(18,29,51,.045); padding:20px; max-width:420px;">
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;">
      <span class="lr-h3">Bayes' theorem</span>
      <span class="lr-num" style="font-size:13px; color:var(--steel-faint);">next in 9d</span>
    </div>
    <p class="lr-body-muted" style="margin:0 0 14px;">P(A|B) = P(B|A)·P(A) / P(B). Update beliefs as new evidence arrives.</p>
    <div style="display:flex; gap:8px;">
      <span style="background:#eef2f7; color:var(--steel-muted); font-size:12px; font-weight:500; padding:3px 9px; border-radius:7px;">statistics</span>
      <span style="background:#eef2f7; color:var(--steel-muted); font-size:12px; font-weight:500; padding:3px 9px; border-radius:7px;">7 reps</span>
    </div>
  </div>
</div></body></html>
