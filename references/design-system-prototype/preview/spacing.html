<!DOCTYPE html>

    <div style="display:flex; align-items:center; gap:14px;"><div style="height:14px; background:var(--primary); width:14px; border-radius:1px;"></div><span class="token" style="width:160px;">3 · 14px — component groups</span></div>
    <div style="display:flex; align-items:center; gap:14px;"><div style="height:14px; background:var(--primary); width:18px; border-radius:1px;"></div><span class="token" style="width:160px;">4 · 18px</span></div>
    <div style="display:flex; align-items:center; gap:14px;"><div style="height:14px; background:var(--primary); width:26px; border-radius:1px;"></div><span class="token" style="width:200px;">6 · 26px — panel padding</span></div>
    <div style="display:flex; align-items:center; gap:14px;"><div style="height:14px; background:var(--primary); width:30px; border-radius:1px;"></div><span class="token" style="width:200px;">7 · 30px — section separation</span></div>
  </div>
</div></body></html>
