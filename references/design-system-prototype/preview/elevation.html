<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <span class="eyebrow" style="display:block; margin-bottom:18px;">Elevation "Soft" + halo focus — no glow, no heavy shadow</span>
  <div style="display:flex; gap:22px; align-items:center; flex-wrap:wrap;">
    <div style="text-align:center;"><div style="width:120px; height:56px; background:#fff; border:1px solid var(--steel-line);"></div><div class="token" style="margin-top:10px;">hairline only</div></div>
    <div style="text-align:center;"><div style="width:120px; height:56px; background:#fff; border:1px solid var(--steel-line); box-shadow:0 1px 2px rgba(18,29,51,.035),0 8px 18px rgba(18,29,51,.045);"></div><div class="token" style="margin-top:10px;">soft (default)</div></div>
    <div style="text-align:center;"><div style="width:120px; height:56px; background:#fff; border:1px solid var(--steel-line); box-shadow:0 1px 2px rgba(18,29,51,.05),0 14px 30px rgba(18,29,51,.08);"></div><div class="token" style="margin-top:10px;">raised (menus)</div></div>
    <div style="text-align:center;"><div style="width:120px; height:56px; background:#fff; border:1px solid var(--steel-line); box-shadow:0 0 0 3px rgba(3,76,213,.32);"></div><div class="token" style="margin-top:10px;">focus halo</div></div>
  </div>
</div></body></html>
