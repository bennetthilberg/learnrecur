<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <span class="eyebrow" style="display:block; margin-bottom:14px;">Semantic status — harmonized &amp; restrained</span>
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px;">
    <div><div class="swatch" style="height:48px; background:#1f7a4d;"></div><div class="token" style="margin-top:6px;">success<br>#1f7a4d</div></div>
    <div><div class="swatch" style="height:48px; background:#b76a00;"></div><div class="token" style="margin-top:6px;">warning<br>#b76a00</div></div>
    <div><div class="swatch" style="height:48px; background:#c0392b;"></div><div class="token" style="margin-top:6px;">error<br>#c0392b</div></div>
    <div><div class="swatch" style="height:48px; background:#034cd5;"></div><div class="token" style="margin-top:6px;">info<br>#034cd5</div></div>
    <div><div class="swatch" style="height:30px; background:#e2f1ea;"></div><div class="token" style="margin-top:5px;">soft</div></div>
    <div><div class="swatch" style="height:30px; background:#fbf0dd;"></div><div class="token" style="margin-top:5px;">soft</div></div>
    <div><div class="swatch" style="height:30px; background:#fbe7e4;"></div><div class="token" style="margin-top:5px;">soft</div></div>
    <div><div class="swatch" style="height:30px; background:#e7eefc;"></div><div class="token" style="margin-top:5px;">soft</div></div>
  </div>
</div></body></html>
