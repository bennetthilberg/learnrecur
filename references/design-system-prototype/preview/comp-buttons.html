<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
  .btn{font-family:var(--font-sans);font-size:14px;font-weight:500;border-radius:5px;padding:8px 14px;border:1px solid transparent;cursor:pointer;line-height:1.2;}
  .btn-primary{background:#034cd5;color:#fff;}
  .btn-primary.hover{background:#0341b6;}
  .btn-primary.press{background:#032f86;}
  .btn-secondary{background:#e7eefc;color:#023a9e;}
  .btn-ghost{background:#fff;color:var(--steel-ink);border-color:var(--steel-line-strong);}
  .btn-primary.focus{box-shadow:0 0 0 3px rgba(3,76,213,.32);}
</style></head>
<body><div class="card">
  <span class="eyebrow" style="display:block; margin-bottom:14px;">Buttons — compact, tool-like proportions</span>
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; gap:10px; align-items:center;">
      <button class="btn btn-primary">Start review</button>
      <button class="btn btn-secondary">Add item</button>
      <button class="btn btn-ghost">Cancel</button>
      <span class="token">default</span>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <button class="btn btn-primary hover">Start review</button>
      <button class="btn btn-primary press">Start review</button>
      <button class="btn btn-primary focus">Start review</button>
      <span class="token">hover · press · focus halo</span>
    </div>
  </div>
</div></body></html>
