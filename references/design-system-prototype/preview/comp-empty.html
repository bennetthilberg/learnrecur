<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <span class="eyebrow" style="display:block; margin-bottom:14px;">Empty state — quiet structural illustration + inviting CTA</span>
  <div style="background:#fff; border:1px solid var(--steel-line); border-radius:10px; padding:32px 28px; max-width:440px; text-align:center;">

    <!-- Low-contrast illustration: stacked review cards + interval dots -->
    <div style="position:relative; width:120px; height:88px; margin:0 auto 20px;">
      <div style="position:absolute; left:50%; top:14px; width:78px; height:54px; transform:translateX(-50%) rotate(-7deg); background:var(--steel-page); border:1px solid var(--steel-line); border-radius:8px;"></div>
      <div style="position:absolute; left:50%; top:10px; width:78px; height:54px; transform:translateX(-50%) rotate(5deg); background:var(--steel-page); border:1px solid var(--steel-line); border-radius:8px;"></div>
      <div style="position:absolute; left:50%; top:4px; width:80px; height:56px; transform:translateX(-50%); background:#fff; border:1px solid var(--steel-line-strong); border-radius:8px; box-shadow:0 1px 2px rgba(18,29,51,.04); display:flex; align-items:flex-end; justify-content:center; padding-bottom:11px; gap:7px;">
        <span style="width:6px;height:6px;border-radius:999px;background:var(--steel-line-strong);"></span>
        <span style="width:6px;height:6px;border-radius:999px;background:var(--steel-line-strong);opacity:.7;"></span>
        <span style="width:6px;height:6px;border-radius:999px;background:var(--steel-line-strong);opacity:.45;"></span>
        <span style="width:6px;height:6px;border-radius:999px;background:var(--steel-line-strong);opacity:.25;"></span>
      </div>
    </div>

    <div class="lr-h3" style="margin-bottom:6px;">No items yet</div>
    <p class="lr-body-muted" style="margin:0 auto 18px; max-width:300px;">Add something you want to remember. LearnRecur schedules the reviews for you.</p>

    <div style="display:inline-flex; flex-direction:column; gap:8px; margin-bottom:20px; text-align:left;">
      <div style="display:flex; align-items:center; gap:9px; font-size:13px; color:var(--steel-muted);"><span style="width:16px;height:16px;border:1.5px solid var(--steel-line-strong);border-radius:4px;flex:none;"></span>Write the thing to recall</div>
      <div style="display:flex; align-items:center; gap:9px; font-size:13px; color:var(--steel-muted);"><span style="width:16px;height:16px;border:1.5px solid var(--steel-line-strong);border-radius:4px;flex:none;"></span>Add a source <span style="color:var(--accent-ink);">(recommended)</span></div>
    </div>

    <div>
      <button style="display:inline-flex; align-items:center; gap:8px; background:#034cd5; color:#fff; font-family:var(--font-sans); font-size:15px; font-weight:500; border:none; border-radius:6px; padding:11px 20px; cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Add your first item
      </button>
    </div>
  </div>
</div></body></html>
