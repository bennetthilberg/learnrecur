<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>.chip{font-size:12px;font-weight:500;padding:3px 10px;border-radius:7px;display:inline-flex;align-items:center;gap:5px;line-height:1.4;}
.dot{width:6px;height:6px;border-radius:999px;display:inline-block;}</style></head>
<body><div class="card">
  <span class="eyebrow" style="display:block; margin-bottom:14px;">Chips &amp; badges — 7px radius, status &amp; metadata</span>
  <div style="display:flex; flex-wrap:wrap; gap:9px; align-items:center;">
    <span class="chip" style="background:#e2f1ea; color:#145536;"><span class="dot" style="background:#1f7a4d;"></span>Known</span>
    <span class="chip" style="background:#e7eefc; color:#023a9e;"><span class="dot" style="background:#034cd5;"></span>Due today</span>
    <span class="chip" style="background:#fbf0dd; color:#6f4200;"><span class="dot" style="background:#b76a00;"></span>No source</span>
    <span class="chip" style="background:#fbe7e4; color:#8a2018;"><span class="dot" style="background:#c0392b;"></span>Lapsed</span>
    <span class="chip" style="background:#eef2f7; color:var(--steel-muted);">statistics</span>
    <span class="chip" style="background:#eef2f7; color:var(--steel-muted);">biology</span>
    <span class="chip" style="background:#034cd5; color:#fff; border-radius:999px; padding:2px 8px;">12</span>
  </div>
  <div class="token" style="margin-top:14px;">soft fills · primary count badge uses pill (very small)</div>
</div></body></html>
