<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
  .nav{width:230px;background:#fff;border:1px solid var(--steel-line);border-radius:10px;padding:10px;}
  .ni{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:5px;font-size:14px;color:var(--steel-muted);cursor:pointer;}
  .ni .gl{width:16px;height:16px;border-radius:4px;border:1.6px solid currentColor;flex:none;opacity:.85;}
  .ni.active{background:#e7eefc;color:#023a9e;font-weight:500;}
  .ni.hover{background:#eef2f7;color:var(--steel-ink);}
</style></head>
<body><div class="card">
  <span class="eyebrow" style="display:block; margin-bottom:14px;">Navigation — sidebar item states (rest / hover / active)</span>
  <div class="nav">
    <div class="ni active"><span class="gl"></span>Review <span style="margin-left:auto;background:#034cd5;color:#fff;font-size:11px;font-weight:500;padding:1px 7px;border-radius:999px;">12</span></div>
    <div class="ni hover"><span class="gl"></span>All items</div>
    <div class="ni"><span class="gl"></span>Sources</div>
    <div class="ni"><span class="gl"></span>Stats</div>
    <div class="ni"><span class="gl"></span>Settings</div>
  </div>
</div></body></html>
