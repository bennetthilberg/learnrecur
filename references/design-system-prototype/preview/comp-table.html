<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
  .tbl-wrap{background:#fff;border:1px solid var(--steel-line-strong);border-radius:8px;overflow:hidden;}
  table{border-collapse:collapse;width:100%;font-size:14px;}
  th{font-size:12px;font-weight:560;letter-spacing:.02em;color:var(--steel-muted);text-align:left;padding:9px 14px;background:var(--steel-page);border-bottom:1px solid var(--steel-line-strong);}
  td{padding:11px 14px;border-bottom:1px solid var(--steel-line);color:var(--steel-ink);}
  tbody tr:last-child td{border-bottom:none;}
  .num{text-align:right;font-feature-settings:'tnum' 1;font-variant-numeric:tabular-nums;}
</style></head>
<body><div class="card">
  <span class="eyebrow" style="display:block; margin-bottom:12px;">Table — bordered white surface, rules, tabular columns</span>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>Item</th><th>Tag</th><th class="num">Reps</th><th class="num">Interval</th><th class="num">Retention</th></tr></thead>
      <tbody>
        <tr><td>Krebs cycle</td><td>biology</td><td class="num">11</td><td class="num">14d</td><td class="num">96%</td></tr>
        <tr><td>Bayes' theorem</td><td>statistics</td><td class="num">7</td><td class="num">9d</td><td class="num">91%</td></tr>
        <tr><td>Loanwords (JP)</td><td>language</td><td class="num">23</td><td class="num">128d</td><td class="num">99%</td></tr>
      </tbody>
    </table>
  </div>
</div></body></html>
