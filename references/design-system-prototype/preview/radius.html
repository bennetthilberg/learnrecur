<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body><div class="card">
  <span class="eyebrow" style="display:block; margin-bottom:14px;">Radius — tight corners read as a precise tool</span>
  <div style="display:flex; gap:18px; align-items:flex-end;">
    <div style="text-align:center;"><div style="width:74px; height:54px; background:var(--primary-soft); border:1px solid var(--steel-line); border-radius:3px;"></div><div class="token" style="margin-top:7px;">sm · 3px</div></div>
    <div style="text-align:center;"><div style="width:74px; height:54px; background:var(--primary-soft); border:1px solid var(--steel-line); border-radius:5px;"></div><div class="token" style="margin-top:7px;">base · 5px</div></div>
    <div style="text-align:center;"><div style="width:74px; height:54px; background:var(--primary-soft); border:1px solid var(--steel-line); border-radius:7px;"></div><div class="token" style="margin-top:7px;">chip · 7px</div></div>
    <div style="text-align:center;"><div style="width:74px; height:54px; background:var(--primary-soft); border:1px solid var(--steel-line); border-radius:10px;"></div><div class="token" style="margin-top:7px;">lg · 10px</div></div>
    <div style="text-align:center;"><div style="width:74px; height:30px; background:var(--primary-soft); border:1px solid var(--steel-line); border-radius:999px;"></div><div class="token" style="margin-top:7px;">pill · tiny tags</div></div>
  </div>
</div></body></html>
