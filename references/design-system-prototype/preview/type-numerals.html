<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>

      <span>Loanwords (JP)</span><span style="text-align:right;">23</span><span style="text-align:right;">128d</span><span style="text-align:right;">99%</span>

  </div>
</div></body></html>
