<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
  .field{font-family:var(--font-sans);font-size:14px;color:var(--steel-ink);background:#fff;border:1px solid var(--steel-line-strong);border-radius:5px;padding:9px 11px;width:220px;}
  .field.focus{border-color:#034cd5;box-shadow:0 0 0 3px rgba(3,76,213,.32);outline:none;}
  .flabel{font-size:13px;font-weight:500;color:var(--steel-muted);margin-bottom:6px;display:block;}
</style></head>
<body><div class="card">
  <span class="eyebrow" style="display:block; margin-bottom:14px;">Inputs — halo focus, hairline rest state</span>
  <div style="display:flex; gap:26px;">
    <div><label class="flabel">Item front</label><input class="field" value="Krebs cycle" readonly></div>
    <div><label class="flabel">Source URL <span style="color:var(--steel-faint);font-weight:400;">(focused)</span></label><input class="field focus" value="https://" readonly></div>
  </div>
  <div style="margin-top:14px;display:flex;align-items:center;gap:8px;">
    <input class="field" placeholder="Add a tag…" style="width:160px;" readonly>
    <span class="token">placeholder · sentence case</span>
  </div>
</div></body></html>
